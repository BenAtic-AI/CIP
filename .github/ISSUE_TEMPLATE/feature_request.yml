name: Feature request
description: Suggest an improvement for CIP.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea.
        Please describe the problem it solves and keep the request practical.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      placeholder: It is hard to...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      placeholder: We could add...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional, but helpful if you already evaluated another approach.
      placeholder: Another option would be...
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, or rollout notes if relevant.
      placeholder: This would help because...
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I checked existing issues for a similar request.
        - label: I understand this template is for concrete feature requests, not support questions.
