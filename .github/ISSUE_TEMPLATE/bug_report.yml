name: Bug report
description: Report a reproducible problem in CIP.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.
        Please keep it focused on the current behavior you observed.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: A short description of the problem.
      placeholder: The API returns a 500 when...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Share the smallest set of steps needed to reproduce the issue.
      placeholder: |
        1. Run...
        2. Open...
        3. See error...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: The request should succeed and return...
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: Instead, the app...
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, browser, or local/dev environment details if relevant.
      placeholder: Windows 11, Chrome 134, local dev
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I checked existing issues for a similar report.
        - label: I removed secrets, keys, connection strings, and tenant-specific values from this report.
