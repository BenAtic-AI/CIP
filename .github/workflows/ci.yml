name: CI

on:
  pull_request:
    paths:
      - '.github/workflows/ci.yml'
      - 'CIP.slnx'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'package.json'
      - 'package-lock.json'
      - 'src/backend/**'
      - 'src/web/**'
      - 'tests/**'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/ci.yml'
      - 'CIP.slnx'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'package.json'
      - 'package-lock.json'
      - 'src/backend/**'
      - 'src/web/**'
      - 'tests/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore backend
        run: dotnet restore CIP.slnx

      - name: Build backend
        run: dotnet build CIP.slnx --configuration Release --no-restore

      - name: Test backend
        run: dotnet test CIP.slnx --configuration Release --no-build --verbosity normal

  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '23.x'
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck frontend
        run: npm run typecheck:web

      - name: Build frontend
        run: npm run build:web
